<!DOCTYPE html>
<html>
<head>
  <title>The Jobs Watch</title>
  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>

<body>

<header>
  <h1>💼 The Jobs Watch</h1>
  <p>Live job opportunities updated automatically</p>

  <a class="btn" href="post.html">➕ Post a Job</a>
</header>

<div id="jobs"></div>

<script>
  // 🔥 YOUR FIREBASE CONFIG (PASTE YOURS HERE)
  const firebaseConfig = {
    apiKey: "PASTE_HERE",
    authDomain: "PASTE_HERE",
    projectId: "PASTE_HERE",
    storageBucket: "PASTE_HERE",
    messagingSenderId: "PASTE_HERE",
    appId: "PASTE_HERE"
  };

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const jobsDiv = document.getElementById("jobs");

  // 🔄 Load jobs automatically
  db.collection("jobs").onSnapshot(snapshot => {
    jobsDiv.innerHTML = "";

    snapshot.forEach(doc => {
      let job = doc.data();

      jobsDiv.innerHTML += `
        <div class="job">
          <img src="${job.image}" />
          <h2>${job.title}</h2>
          <p>📍 ${job.location}</p>
          <p class="quote">${job.description}</p>

          <a class="btn" href="${job.applyLink}" target="_blank">
            Apply Now
          </a>
        </div>
      `;
    });
  });
</script>

</body>
</html>
