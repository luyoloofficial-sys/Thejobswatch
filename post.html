<!DOCTYPE html>
<html>
<head>
  <title>Post Job</title>
  <link rel="stylesheet" href="style.css">

  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>

<body>

<header>
  <input type="text" id="searchBox" placeholder="Search jobs..." />
  <h1>➕ Post a Job</h1>
</header>

<div class="job">

  <input id="title" placeholder="Job Title">
  <input id="location" placeholder="Location">
  <input id="image" placeholder="Image URL">
  <input id="applyLink" placeholder="Apply Link">
  <textarea id="description" placeholder="Description"></textarea>

  <button class="btn" onclick="postJob()">Submit Job</button>

</div>

<script>
  const firebaseConfig = {
  apiKey: "AIzaSyBVABpObe1Gz4Y3WeewWcQGMF_LOqp9ASw",
  authDomain: "thejobswatch-87ee3.firebaseapp.com",
  projectId: "thejobswatch-87ee3",
  storageBucket: "thejobswatch-87ee3.firebasestorage.app",
  messagingSenderId: "92880904032",
  appId: "1:92880904032:web:a9b55eb50f41d40c344805"
};

  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  function postJob() {
    db.collection("jobs").add({
      title: document.getElementById("title").value,
      location: document.getElementById("location").value,
      image: document.getElementById("image").value,
      applyLink: document.getElementById("applyLink").value,
      description: document.getElementById("description").value,
      time: Date.now()
    });

    alert("Job posted successfully!");
    window.location.href = "index.html";
  }
</script>

</body>
</html>
