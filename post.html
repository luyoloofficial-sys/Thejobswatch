<!DOCTYPE html>
<html>
<head>
  <title>Post a Job</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
  <h1>➕ Post a Job</h1>
  <p>Share job opportunities with others</p>
</header>

<section class="job">

  <form action="https://formsubmit.co/youremail@gmail.com" method="POST">

    <input type="text" name="job_title" placeholder="Job Title" required>

    <input type="text" name="location" placeholder="Location" required>

    <input type="url" name="image_url" placeholder="Image URL (optional)">

    <input type="url" name="apply_link" placeholder="Apply Link (WhatsApp, Website, Email link)" required>

    <textarea name="description" placeholder="Job Description / Motivation" required></textarea>

    <!-- disables captcha page -->
    <input type="hidden" name="_captcha" value="false">

    <button type="submit" class="btn">Submit Job</button>

  </form>

  <p class="quote">“Opportunities multiply when shared.”</p>

</section>

</body>
</html>
